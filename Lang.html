    /**
     * 翻訳関数: 日本語キーを現在の言語に翻訳
     * @param {string} key - 日本語テキスト（そのままキーとして使う）
     * @param {Object} [vars] - 置換変数 {n: 3} → '{n}' を '3' に
     * @returns {string}
     */
    function t(key, vars) {
        var text = key;
        if (CURRENT_LANG === 'en' && LANG_EN[key]) {
            text = LANG_EN[key];
        }
        if (vars) {
            for (var k in vars) {
                if (vars.hasOwnProperty(k)) {
                    text = text.replace('{' + k + '}', vars[k]);
                }
            }
        }
        return text;
    }

    /**
     * DOM要素のテキストを一括翻訳
     * data-t 属性を持つ要素のtextContentを翻訳する
     * data-t-placeholder を持つ要素のplaceholderを翻訳する
     */
    function applyTranslations() {
        if (CURRENT_LANG === 'ja') return; // 日本語はHTMLのまま

        // data-t 属性: テキスト翻訳
        document.querySelectorAll('[data-t]').forEach(function (el) {
            var key = el.getAttribute('data-t');
            if (key && LANG_EN[key]) {
                el.textContent = LANG_EN[key];
            }
        });

        // data-t-placeholder 属性: placeholder翻訳
        document.querySelectorAll('[data-t-placeholder]').forEach(function (el) {
            var key = el.getAttribute('data-t-placeholder');
            if (key && LANG_EN[key]) {
                el.placeholder = LANG_EN[key];
            }
        });

        // data-t-title 属性: title翻訳
        document.querySelectorAll('[data-t-title]').forEach(function (el) {
            var key = el.getAttribute('data-t-title');
            if (key && LANG_EN[key]) {
                el.title = LANG_EN[key];
            }
        });
    }
</script>
